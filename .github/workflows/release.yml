name: Release Swipe-Files

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, e.g., v1.0.0, v2.1.3

jobs:
  build_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        id: decode_keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "KEYSTORE_PATH=$(pwd)/release.keystore" >> $GITHUB_ENV

      - name: Set Version Variables
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          # Extract version from tag (e.g., refs/tags/v1.0.0 -> 1.0.0)
          VERSION_NAME=${GITHUB_REF#refs/tags/v}
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Grant Execute Permission to gradlew
        run: chmod +x Swipe-Files/gradlew

      - name: Build Release APK and AAB
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cd Swipe-Files
          ./gradlew assembleRelease bundleRelease

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swipe-files-release-apk
          path: Swipe-Files/app/build/outputs/apk/release/app-release.apk

      - name: Upload Release AAB as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swipe-files-release-aab
          path: Swipe-Files/app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ env.VERSION_NAME }}
          draft: false
          prerelease: false
          files: |
            Swipe-Files/app/build/outputs/apk/release/app-release.apk
            Swipe-Files/app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
